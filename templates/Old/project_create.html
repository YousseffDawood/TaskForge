<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Project</title>
<style>
    /* Base styles */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a40, #2d046e);
        color: #fff;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
        from {opacity:0;}
        to {opacity:1;}
    }

    /* Card container */
    .card {
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        width: 100%;
        max-width: 500px;
        backdrop-filter: blur(10px);
        animation: slideUp 0.8s ease forwards;
        transform: translateY(50px);
    }

    @keyframes slideUp {
        to {transform: translateY(0);}
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 2em;
        background: linear-gradient(90deg, #6a0dad, #1e3c72);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
        from {text-shadow: 0 0 5px #6a0dad;}
        to {text-shadow: 0 0 20px #1e3c72;}
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        font-size: 0.95em;
    }

    input[type="text"], textarea, select {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 8px;
        border: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
        font-size: 1em;
        transition: all 0.3s ease;
    }

    input[type="text"]:focus, textarea:focus, select:focus {
        background: rgba(255,255,255,0.2);
        outline: none;
        box-shadow: 0 0 10px #6a0dad;
    }

    select {
        height: 120px;
    }

    button {
        width: 100%;
        padding: 15px;
        background: linear-gradient(90deg, #6a0dad, #1e3c72);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 1.1em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button:hover {
        background: linear-gradient(90deg, #1e3c72, #6a0dad);
        transform: scale(1.05);
        box-shadow: 0 0 15px #6a0dad;
    }

    /* Messages */
    .messages {
        margin-top: 20px;
        padding: 10px;
        border-radius: 8px;
        background: rgba(255,255,255,0.1);
        color: #ffdd57;
        font-weight: bold;
        text-align: center;
        animation: bounce 0.8s ease;
    }

    @keyframes bounce {
        0% {transform: translateY(-10px);}
        50% {transform: translateY(5px);}
        100% {transform: translateY(0);}
    }

</style>
</head>
<body>
    <div class="card">
        <h1>Create New Project</h1>

        <form method="post">
            {% csrf_token %}

            <label for="project_name">Project Name</label>
            <input type="text" id="project_name" name="project_name" placeholder="Enter project name" required>

            <label for="project_description">Project Description</label>
            <textarea id="project_description" name="project_description" rows="4" placeholder="Enter project description" required></textarea>

            <label for="project_members">Select Members</label>
            <select id="project_members" name="project_members" multiple>
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
            </select>

            <button type="submit">Create Project</button>
        </form>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
            </div>
        {% endif %}
    </div>
</body>
</html>
